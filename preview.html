<!DOCTYPE html>
<html lang="ja" class="page-preview-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0070b8" />
    <title>スライド — プレビュー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-preview-workspace page-preview-solo">
    <header class="preview-toolbar" aria-label="操作">
      <div class="preview-toolbar-left">
        <a class="btn btn-ghost" href="index.html">← メイン</a>
        <div class="preview-nav" role="group" aria-label="スライド移動">
          <button type="button" class="btn btn-ghost btn-icon" id="btn-prev-slide" aria-label="前のスライド">←</button>
          <span class="preview-counter" id="slide-counter" aria-live="polite">1 / 1</span>
          <button type="button" class="btn btn-ghost btn-icon" id="btn-next-slide" aria-label="次のスライド">→</button>
        </div>
      </div>
      <div class="preview-toolbar-right">
        <button type="button" class="btn btn-primary" id="btn-export-html">HTML を書き出し</button>
        <button type="button" class="btn btn-ghost" id="btn-reset-sample">サンプルに戻す</button>
      </div>
    </header>

    <div class="preview-workspace">
      <aside class="preview-sidebar panel" aria-label="スライド一覧">
        <div class="panel-title">スライド一覧</div>
        <ul class="slide-list" id="slide-list"></ul>
        <div class="panel-footer preview-sidebar-footer">
          <button type="button" class="btn btn-primary btn-block" id="btn-add-slide">＋ 追加</button>
          <button type="button" class="btn btn-danger btn-block" id="btn-delete-slide">削除</button>
        </div>
      </aside>

      <div class="preview-workspace-main">
        <div class="layout-preset-bar" id="layout-preset-bar" aria-label="デザインテンプレート"></div>
        <div
          class="slide-frame slide-frame--solo slide-frame--workspace"
          id="slide-preview"
          role="region"
          aria-label="現在のスライド"
        ></div>
        <div class="preview-source-panel">
          <label for="slide-body" class="preview-source-label">本文</label>
          <textarea
            id="slide-body"
            name="slide-body"
            class="slide-body-textarea-solo"
            spellcheck="false"
            placeholder=":::table または 箇条書き / :::media（左画像）"
          ></textarea>
          <p class="field-hint-below">
            表（<code>:::table</code>）・箇条書き・<code>:::media</code> のいずれかで構造化してください。
            <code>:::cards</code> / <code>:::compare</code> も利用可能です。
          </p>
        </div>
      </div>
    </div>

    <script src="client.js"></script>
  </body>
</html>
